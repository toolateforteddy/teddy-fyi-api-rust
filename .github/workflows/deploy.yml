name: Build and Push to Google Container Registry

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    name: Build and Push Image
    runs-on: ubuntu-latest

    # Required permissions for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    # Database service for running integration tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        entrypoint: ["docker-entrypoint.sh"]
        command: ["postgres", "-c", "fsync=off", "-c", "synchronous_commit=off", "-c", "full_page_writes=off"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up Rust toolchain for running tests
      - name: Set up Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      # Run Cargo tests (requires SQLx offline mode for query verification)
      - name: Run Tests
        env:
          SQLX_OFFLINE: true
          DATABASE_URL: postgres://postgres:password@localhost:5432/test_db
        run: make test

      # Authenticate to Google Cloud.
      # You can authenticate using either Workload Identity Federation (Recommended)
      # or a Google Cloud Service Account Key. See the documentation in the pull request / readme.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Set up Docker Buildx (required for caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Set up gcloud CLI & configure docker authentication
      - name: Configure Docker
        run: |
          gcloud auth configure-docker gcr.io --quiet

      # Build, tag, and push the container using the Makefile target.
      # We inject the commit SHA as the VERSION variable to prevent local image tag collisions
      # on shared runner machines, and leverage GitHub Actions caching for Docker.
      - name: Build and Push Docker Image
        run: |
          make docker-push \
            VERSION=${{ github.sha }} \
            BUILDER="docker buildx" \
            BUILD_ARGS="--cache-from=type=gha --cache-to=type=gha,mode=max --load"

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: prod
          location: us-central1-a
          project_id: melodic-sunbeam-164916

      - name: Deploy to GKE (Rollout Restart)
        run: |
          kubectl rollout restart deployment/api-rust-dep
